syntax = "proto3";
package mirage;
option go_package = "mirage-proto/gen";

// ========== 上行服务（Gateway → OS）==========
service GatewayUplink {
    rpc SyncHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc ReportTraffic(TrafficRequest) returns (TrafficResponse);
    rpc ReportThreat(ThreatRequest) returns (ThreatResponse);
    rpc ReportSessionEvent(SessionEventRequest) returns (SessionEventResponse);
    rpc RegisterGateway(RegisterRequest) returns (RegisterResponse);
}

// ========== 下行服务（OS → Gateway）==========
service GatewayDownlink {
    rpc PushBlacklist(BlacklistPush) returns (PushResponse);
    rpc PushStrategy(StrategyPush) returns (PushResponse);
    rpc PushQuota(QuotaPush) returns (PushResponse);
    rpc PushReincarnation(ReincarnationPush) returns (PushResponse);
}

// ========== 枚举 ==========
enum GatewayStatus {
    ONLINE = 0;
    DEGRADED = 1;
    EMERGENCY = 2;
}

enum ThreatType {
    THREAT_UNKNOWN = 0;
    ACTIVE_PROBING = 1;
    REPLAY_ATTACK = 2;
    TIMING_ATTACK = 3;
    DPI_DETECTION = 4;
    JA4_SCAN = 5;
    SNI_PROBE = 6;
}

enum BlacklistSourceType {
    BL_LOCAL = 0;
    BL_GLOBAL = 1;
}

// ========== 注册消息 ==========
message RegisterRequest {
    string gateway_id = 1;
    string cell_id = 2;
    string downlink_addr = 3;
    string version = 4;
    GatewayCapabilities capabilities = 5;
}

message GatewayCapabilities {
    bool ebpf_supported = 1;
    int32 max_connections = 2;
    int32 max_sessions = 3;
}

message RegisterResponse {
    bool success = 1;
    string message = 2;
    string assigned_cell_id = 3;
}

// ========== 上行消息 ==========
message HeartbeatRequest {
    string gateway_id = 1;
    int64 timestamp = 2;
    GatewayStatus status = 3;
    bool ebpf_loaded = 4;
    int32 threat_level = 5;
    int64 active_connections = 6;
    int32 memory_usage_mb = 7;
    repeated UserQuotaSummary user_quotas = 8;
    // 新增：拓扑语义
    string downlink_addr = 9;
    string cell_id = 10;
    int32 active_sessions = 11;
    string state_hash = 12;
    string version = 13;
}

message UserQuotaSummary {
    string user_id = 1;
    uint64 remaining_bytes = 2;
    int32 active_sessions = 3;
}

message HeartbeatResponse {
    bool ack = 1;
    int64 server_time = 2;
    double remaining_quota = 3;
    // 新增：状态对齐
    bool needs_full_sync = 4;
    string desired_state_hash = 5;
}

message TrafficRequest {
    string gateway_id = 1;
    int64 timestamp = 2;
    uint64 business_bytes = 3;
    uint64 defense_bytes = 4;
    int32 period_seconds = 5;
    string user_id = 6;
    string session_id = 7;
    uint64 sequence_number = 8;
}

message TrafficResponse {
    bool ack = 1;
}

message ThreatEvent {
    int64 timestamp = 1;
    ThreatType threat_type = 2;
    string source_ip = 3;
    uint32 source_port = 4;
    int32 severity = 5;
    uint32 packet_count = 6;
}

message ThreatRequest {
    string gateway_id = 1;
    repeated ThreatEvent events = 2;
}

message ThreatResponse {
    bool ack = 1;
}

// ========== 下行消息 ==========
message BlacklistEntryProto {
    string cidr = 1;
    int64 expire_at = 2;
    BlacklistSourceType source = 3;
}

message BlacklistPush {
    repeated BlacklistEntryProto entries = 1;
}

message StrategyPush {
    int32 defense_level = 1;
    uint32 jitter_mean_us = 2;
    uint32 jitter_stddev_us = 3;
    uint32 noise_intensity = 4;
    uint32 padding_rate = 5;
    uint32 template_id = 6;
}

message QuotaPush {
    uint64 remaining_bytes = 1;
    string user_id = 2;
}

message ReincarnationPush {
    string new_domain = 1;
    string new_ip = 2;
    string reason = 3;
    int32 deadline_seconds = 4;
}

message PushResponse {
    bool success = 1;
    string message = 2;
}

// ========== 会话事件 ==========
enum SessionEventType {
    SESSION_CONNECTED = 0;
    SESSION_DISCONNECTED = 1;
    SESSION_MIGRATING = 2;
}

message SessionEventRequest {
    string gateway_id = 1;
    string session_id = 2;
    string user_id = 3;
    string client_id = 4;
    SessionEventType event_type = 5;
    int64 timestamp = 6;
}

message SessionEventResponse {
    bool ack = 1;
}
