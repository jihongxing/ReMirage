# Mirage-Gateway Production Manifest
# 生产环境部署配置 - Kubernetes / Docker Compose 兼容
# Version: 1.0.0

---
apiVersion: v1
kind: Namespace
metadata:
  name: mirage-system
  labels:
    app.kubernetes.io/name: mirage
    app.kubernetes.io/component: gateway

---
# 密钥初始化 - Shamir 分片存储
apiVersion: v1
kind: Secret
metadata:
  name: mirage-master-key
  namespace: mirage-system
type: Opaque
data:
  # Base64 编码的 Shamir 分片 (部署时替换)
  shard_1: "REPLACE_WITH_SHARD_1"
  shard_2: "REPLACE_WITH_SHARD_2"
  shard_3: "REPLACE_WITH_SHARD_3"
  # HMAC 签名密钥（高危命令校验，必填）
  command_secret: "REPLACE_WITH_COMMAND_SECRET"
  # XMR 钱包视图密钥
  xmr_view_key: "REPLACE_WITH_XMR_VIEW_KEY"
  # Tor 隐藏服务私钥
  tor_private_key: "REPLACE_WITH_TOR_KEY"

---
# ConfigMap - 运行时配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: mirage-gateway-config
  namespace: mirage-system
data:
  gateway.yaml: |
    # 网关核心配置（与 cmd/gateway/main.go GatewayConfig 结构对齐）
    gateway_id: "${NODE_ID}"

    network:
      interface: "eth0"

    defense:
      level: 20
      auto_adjust: false
      update_interval: 60s
      l1:
        asn_blocklist_path: "/opt/mirage/config/asn_database.json"
        cloud_ranges_path: "/opt/mirage/config/cloud_ranges.json"
        rate_limit:
          syn_pps: 50
          conn_pps: 200
          enabled: true
        silent_response:
          drop_icmp_unreachable: true
          drop_tcp_rst: true
          enabled: true
      l2:
        nonce_store_size: 100000
        nonce_ttl_seconds: 300
        handshake_timeout_ms: 300
      l3:
        behavior_check_interval_seconds: 10
        deviation_threshold: 0.7

    mcc:
      endpoint: "${MCC_ENDPOINT:-10.99.0.10:50051}"
      cell_id: "${CELL_ID:-default}"
      tls:
        enabled: true
        cert_file: "/opt/mirage/secrets/gateway.crt"
        key_file: "/opt/mirage/secrets/gateway.key"
        ca_file: "/opt/mirage/secrets/ca.crt"
        server_name: mirage-os

    security:
      command_secret: "${MIRAGE_COMMAND_SECRET}"
      ram_shield:
        enabled: true
        disable_core_dump: true
        check_swap_interval: 60s
      cert_pinning:
        enabled: true
        preset_hash: ""
      anti_debug:
        enabled: true
        check_interval: 30s
      graceful_shutdown:
        timeout: 30s

    phantom:
      persona:
        company_name: "CloudBridge Systems"
        domain: "cloudbridge.io"
        tag_line: "Enterprise Cloud Infrastructure"
        primary_color: "#2563eb"
        error_prefix: "CB"
        api_version: "v2"
        copyright_year: 2026
      honeypot_pool:
        0: "10.99.1.100"
        1: "10.99.1.101"
        2: "10.99.1.102"
        3: "10.99.1.103"
      default_ttl_seconds: 3600
      high_risk_ttl_seconds: 86400
      labyrinth_max_depth: 5
      labyrinth_max_delay_ms: 3000

---
# DaemonSet - 每节点部署一个 Gateway
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mirage-gateway
  namespace: mirage-system
spec:
  selector:
    matchLabels:
      app: mirage-gateway
  template:
    metadata:
      labels:
        app: mirage-gateway
    spec:
      hostNetwork: true
      hostPID: true
      
      # 节点亲和性 - 仅部署到标记节点
      nodeSelector:
        mirage.io/role: gateway
        
      tolerations:
        - key: "node-role.kubernetes.io/master"
          effect: NoSchedule
          
      initContainers:
        # 部署前检查：确保不包含 CA 私钥
        - name: security-preflight
          image: busybox:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[Preflight] 检查 CA 私钥是否泄露到部署产物..."
              for f in /opt/mirage/secrets/ca.key /opt/mirage/secrets/root-ca.key; do
                if [ -f "$f" ]; then
                  echo "[FATAL] 发现 CA 私钥: $f — 拒绝启动"
                  exit 1
                fi
              done
              echo "[Preflight] ✅ 未发现 CA 私钥，安全检查通过"
          volumeMounts:
            - name: secrets
              mountPath: /opt/mirage/secrets
              readOnly: true
        # 初始化容器 - 编译 eBPF 程序
        - name: ebpf-compiler
          image: mirage/ebpf-builder:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /bpf
              for f in npm.c bdna.c jitter.c sockmap.c chameleon.c phantom.c; do
                clang -O2 -g -target bpf -c $f -o ${f%.c}.o
              done
              cp *.o /ebpf-out/
          volumeMounts:
            - name: bpf-source
              mountPath: /bpf
            - name: ebpf-objects
              mountPath: /ebpf-out
              
      containers:
        # 主容器 - Mirage Gateway
        - name: gateway
          image: mirage/gateway:latest
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - BPF
                - PERFMON
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/region']
            - name: MIRAGE_COMMAND_SECRET
              valueFrom:
                secretKeyRef:
                  name: mirage-master-key
                  key: command_secret
                  optional: false
            - name: MCC_ENDPOINT
              value: "mirage-os:50847"
            - name: MIRAGE_ENV
              value: "production"
            - name: GOMAXPROCS
              value: "4"
            - name: GODEBUG
              value: "gctrace=0"
          ports:
            - containerPort: 443
              hostPort: 443
              protocol: TCP
            - containerPort: 443
              hostPort: 443
              protocol: UDP
          volumeMounts:
            - name: ebpf-objects
              mountPath: /opt/mirage/bpf
            - name: config
              mountPath: /opt/mirage/config
            - name: secrets
              mountPath: /opt/mirage/secrets
              readOnly: true
            # tmpfs - 内存文件系统 (无痕)
            - name: tmpfs-data
              mountPath: /opt/mirage/data
            - name: tmpfs-logs
              mountPath: /opt/mirage/logs
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
            
        # Sidecar - Tor 隐藏服务
        - name: tor-sidecar
          image: mirage/tor:latest
          securityContext:
            runAsUser: 100
            runAsGroup: 100
          volumeMounts:
            - name: tor-data
              mountPath: /var/lib/tor
            - name: secrets
              mountPath: /etc/tor/secrets
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
              
      volumes:
        - name: bpf-source
          configMap:
            name: mirage-bpf-source
        - name: ebpf-objects
          emptyDir: {}
        - name: config
          configMap:
            name: mirage-gateway-config
        - name: secrets
          secret:
            secretName: mirage-master-key
        # tmpfs 卷 - 纯内存存储
        - name: tmpfs-data
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
        - name: tmpfs-logs
          emptyDir:
            medium: Memory
            sizeLimit: 50Mi
        - name: tor-data
          emptyDir:
            medium: Memory
            sizeLimit: 50Mi

---
# Service - 内部通信
apiVersion: v1
kind: Service
metadata:
  name: mirage-gateway-internal
  namespace: mirage-system
spec:
  clusterIP: None
  selector:
    app: mirage-gateway
  ports:
    - name: mcc
      port: 18443
      targetPort: 18443

---
# NetworkPolicy - 网络隔离
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mirage-gateway-policy
  namespace: mirage-system
spec:
  podSelector:
    matchLabels:
      app: mirage-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 允许外部流量
    - ports:
        - port: 443
          protocol: TCP
        - port: 443
          protocol: UDP
    # 允许 M.C.C. 内部通信
    - from:
        - podSelector:
            matchLabels:
              app: mirage-gateway
      ports:
        - port: 18443
  egress:
    # 允许 DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
    # 允许 Tor 网络
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 9001
        - port: 9030
    # 允许 M.C.C. 通信
    - to:
        - podSelector:
            matchLabels:
              app: mirage-gateway
      ports:
        - port: 18443

---
# PodDisruptionBudget - 高可用保障
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mirage-gateway-pdb
  namespace: mirage-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mirage-gateway

---
# HorizontalPodAutoscaler - 自动扩缩 (可选)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mirage-gateway-hpa
  namespace: mirage-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: mirage-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
