# Mirage-Gateway 配置文件

# Gateway ID（环境变量覆盖）
gateway_id: "${MIRAGE_GATEWAY_ID}"

# 网络接口
network:
  interface: "eth0"           # 监听的网络接口
  mtu: 1500                   # MTU 大小
  queue_size: 1024            # 队列大小

# 防御策略
defense:
  level: 20                   # 防御强度 (10=经济, 20=平衡, 30=极限)
  auto_adjust: false          # 自动调节
  update_interval: 60s        # 策略更新间隔

  # L1 纵深防御（XDP/TC 层）
  l1:
    asn_blocklist_path: "configs/asn_database.json"
    cloud_ranges_path: "configs/cloud_ranges.json"
    rate_limit:
      syn_pps: 50
      conn_pps: 200
      enabled: true
    silent_response:
      drop_icmp_unreachable: true
      drop_tcp_rst: true
      enabled: true

  # L2 密码学层防御（Go 用户空间）
  l2:
    nonce_store_size: 100000
    nonce_ttl_seconds: 300
    handshake_timeout_ms: 300

  # L3 行为层防御（Go 用户空间）
  l3:
    behavior_check_interval_seconds: 10
    deviation_threshold: 0.7

# NPM (流量伪装)
npm:
  enabled: true
  padding_rate: 20            # 填充率 (%)
  min_padding: 50             # 最小填充 (字节)
  max_padding: 500            # 最大填充 (字节)

# Jitter-Lite (时域扰动)
jitter:
  enabled: true
  interval: 50ms              # 扰动区间
  distribution: "gaussian"    # 分布类型 (gaussian/poisson)
  stddev: 15ms                # 标准差

# VPC (噪声注入)
vpc:
  enabled: true
  amplitude: 10ms             # 噪声幅度
  frequency: 100              # 注入频率 (次/秒)
  threat_threshold: 5         # 威胁阈值

# G-Tunnel (多路径)
gtunnel:
  enabled: true
  path_count: 3               # 路径数量
  fec_ratio: 1.2              # FEC 冗余率
  reorder_buffer: 256         # 重组缓冲区大小

  # Orchestrator 多路径自适应调度器
  orchestrator:
    probe_cycle: 30s            # 心跳探测周期
    probe_cycle_level3: 15s     # Level 3 (ICMP/DNS) 时缩短探测周期
    promote_threshold: 3        # 连续成功探测次数后升格
    demote_loss_rate: 0.30      # 降格丢包率阈值
    demote_rtt_multiple: 2.0    # 降格 RTT 倍数阈值
    dual_send_duration: 100ms   # 双发选收窗口时长

  # 各传输协议配置
  transports:
    quic:
      enabled: true
      addr: "gateway.example.com:443"
      timeout: 3s
    wss:
      enabled: true
      endpoint: "wss://gateway.example.com:443/api/v2/stream"
      sni: "cdn.cloudflare.com"
    webrtc:
      enabled: true
      ice_servers:
        - "stun:stun.l.google.com:19302"
      ordered: false
    icmp:
      enabled: false
      target_ip: "198.51.100.1"
      gateway_ip: "203.0.113.1"
      identifier: 0x4D52
    dns:
      enabled: false
      domain: "t.example.com"
      resolver: "8.8.8.8:53"
      query_type: "TXT"

# B-DNA (指纹识别)
bdna:
  enabled: true
  registry_path: "configs/bdna/profile-registry.v1.json"
  ja4_database: "/etc/mirage/ja4.db"  # JA4 指纹库
  update_interval: 24h        # 更新间隔

# G-Switch (域名转生)
gswitch:
  enabled: false              # 由 Mirage-OS 控制
  api_endpoint: "https://mirage-os:8443/api/v1/domains"
  heartbeat_interval: 30s

# 监控
monitoring:
  enabled: true
  stats_interval: 10s         # 统计输出间隔
  ringbuf_size: 1048576       # Ring Buffer 大小 (1MB，防止高威胁场景溢出)

# 日志
logging:
  level: "info"               # debug/info/warn/error
  memory_only: true           # 仅内存日志
  max_entries: 10000          # 最大日志条数

# 入口处置策略
ingress_policy:
  rules:
    - condition: blacklist_hit
      action: drop
      priority: 100
    - condition: threat_level_critical
      action: drop
      priority: 90
    - condition: threat_level_high
      action: throttle
      params: { pps: 10 }
      priority: 80
    - condition: honeypot_hit
      action: trap
      priority: 70
    - condition: suspicious_fingerprint
      action: observe
      priority: 60
    - condition: rate_exceeded
      action: throttle
      params: { pps: 50 }
      priority: 50

# Phantom（影子欺骗）
phantom:
  enabled: true
  persona:
    company_name: "CloudBridge Systems"
    domain: "cloudbridge.io"
    tag_line: "Enterprise Cloud Infrastructure"
    primary_color: "#2563eb"
    error_prefix: "CB"
    api_version: "v2"
    copyright_year: 2026
  honeypot_pool:
    0: "10.99.1.100"   # 默认
    1: "10.99.1.101"   # 低风险
    2: "10.99.1.102"   # 中风险
    3: "10.99.1.103"   # 高风险
  default_ttl_seconds: 3600
  high_risk_ttl_seconds: 86400
  labyrinth_max_depth: 5
  labyrinth_max_delay_ms: 3000

# 安全
security:
  command_secret: "${MIRAGE_COMMAND_SECRET}"  # HMAC 签名密钥（高危命令校验）
  self_destruct: true         # 启用自毁机制
  heartbeat_timeout: 300s     # 心跳超时
  max_idle_days: 30           # 最大空闲天数
  ram_shield:
    enabled: true
    disable_core_dump: true
    check_swap_interval: 60s
  cert_pinning:
    enabled: true
    preset_hash: ""           # 预设 OS 证书 SHA-256 指纹（hex，可选）
  anti_debug:
    enabled: true
    check_interval: 30s
    silent_mode_action: "noise"
  graceful_shutdown:
    timeout: 30s

# M.C.C. 连接配置（mTLS）
# 安全要求：证书/私钥必须存储在 tmpfs 中（/var/mirage/certs/）
# SSD 磨损均衡机制导致普通文件系统的 3-pass 覆写无法保证物理擦除
# docker-compose.tmpfs.yml 已将 /var/mirage 挂载为 tmpfs
mcc:
  endpoint: "10.99.0.10:50051"
  tls:
    enabled: true              # 生产模式下必须为 true，否则 Gateway 拒绝启动
    cert_file: ""
    key_file: ""
    ca_file: ""
    server_name: mirage-os

# 数据面配置
data_plane:
  enable_quic: false          # 启用公网 QUIC/H3 数据面监听；无 UDP 环境必须保持 false
  quic_listen_addr: ":443"    # 公网 QUIC/H3 数据面监听地址（B-01b，待实现）
  enable_wss: true            # 启用 WSS 降级监听
  enable_webrtc: false        # WebRTC 依赖 WSS 信令
  enable_icmp: false          # ICMP Tunnel
  enable_dns: false           # DNS Tunnel

# Chameleon WSS 降级监听配置
chameleon:
  listen_addr: ":8443"        # WSS 降级监听地址（避免与 gRPC 50847 冲突）
  ws_path: "/api/v2/stream"   # WebSocket 路径
  fake_server_name: "cloudflare"
  cert_file: ""               # TLS 证书（与 mcc.tls 共用或独立配置）
  key_file: ""
  ca_file: ""                 # 客户端 CA（mTLS 验证）
