version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mirage_os
      POSTGRES_USER: mirage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirage_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway-bridge:
    build:
      context: ./gateway-bridge
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
      - "7000:7000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_DSN: postgres://mirage:${POSTGRES_PASSWORD:-mirage_dev}@postgres:5432/mirage_os?sslmode=disable
      REDIS_ADDR: redis:6379
      RAFT_NODE_ID: node-1
      RAFT_BIND_ADDR: "0.0.0.0:7000"
      RAFT_BOOTSTRAP: "true"
    volumes:
      - ./configs:/app/configs
      - raft-data:/var/lib/mirage/raft

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://mirage:${POSTGRES_PASSWORD:-mirage_dev}@postgres:5432/mirage_os
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      PORT: 3000

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "8080:80"
    depends_on:
      - api-server

volumes:
  pgdata:
  raft-data:
