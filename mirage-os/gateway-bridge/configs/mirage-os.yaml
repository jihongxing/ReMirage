# Mirage-OS Gateway Bridge 配置（混沌测试用）
grpc:
  port: 50051
  tls_enabled: true

rest:
  addr: "127.0.0.1:7000"
  internal_secret: "${MIRAGE_INTERNAL_SECRET}"

database:
  dsn: "postgres://mirage:chaos_test_pw@10.99.1.10:5432/mirage_os?sslmode=disable"

redis:
  addr: "10.99.1.11:6379"
  password: ""
  db: 0

quota:
  business_price_per_gb: 0.10
  defense_price_per_gb: 0.05

intel:
  ban_threshold: 100
  cleanup_days: 30
  cleanup_min_hits: 10

raft:
  node_id: "os-1"
  bind_addr: "10.99.0.10:7001"
  data_dir: "/var/lib/mirage/raft"
  bootstrap: true
  peers:
    - id: "os-1"
      address: "10.99.0.10:7001"
      voter: true
