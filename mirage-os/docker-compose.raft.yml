version: '3.8'

services:
  # 节点 1: 冰岛
  mirage-os-iceland:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage-os-iceland
    hostname: iceland
    environment:
      - NODE_ID=mirage-os-iceland
      - BIND_ADDR=0.0.0.0:7000
      - JURISDICTION=IS
      - RAFT_PEERS=mirage-os-switzerland:7000,mirage-os-singapore:7000
    ports:
      - "8001:8080"
      - "7001:7000"
    volumes:
      - ./data/iceland:/data
    networks:
      raft_network:
        ipv4_address: 172.20.0.11
    restart: unless-stopped

  # 节点 2: 瑞士
  mirage-os-switzerland:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage-os-switzerland
    hostname: switzerland
    environment:
      - NODE_ID=mirage-os-switzerland
      - BIND_ADDR=0.0.0.0:7000
      - JURISDICTION=CH
      - RAFT_PEERS=mirage-os-iceland:7000,mirage-os-singapore:7000
    ports:
      - "8002:8080"
      - "7002:7000"
    volumes:
      - ./data/switzerland:/data
    networks:
      raft_network:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

  # 节点 3: 新加坡
  mirage-os-singapore:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage-os-singapore
    hostname: singapore
    environment:
      - NODE_ID=mirage-os-singapore
      - BIND_ADDR=0.0.0.0:7000
      - JURISDICTION=SG
      - RAFT_PEERS=mirage-os-iceland:7000,mirage-os-switzerland:7000
    ports:
      - "8003:8080"
      - "7003:7000"
    volumes:
      - ./data/singapore:/data
    networks:
      raft_network:
        ipv4_address: 172.20.0.13
    restart: unless-stopped

networks:
  raft_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  iceland_data:
  switzerland_data:
  singapore_data:
