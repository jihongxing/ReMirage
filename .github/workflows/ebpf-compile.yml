name: eBPF Compile Regression
on: [push, pull_request]
jobs:
  ebpf-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install clang and kernel headers
        run: sudo apt-get update && sudo apt-get install -y clang llvm linux-headers-$(uname -r) libbpf-dev
      - name: Run eBPF compile test
        working-directory: mirage-gateway
        run: go test -run TestBPFCompile_KeyCFiles ./pkg/ebpf -v
