---
all:
  children:
    gateways:
      hosts:
        gw-iceland:
          ansible_host: 10.0.1.10
          node_id: gw-iceland-01
          network_interface: eth0
          region: eu-north
          jurisdiction: IS
        gw-switzerland:
          ansible_host: 10.0.2.10
          node_id: gw-switzerland-01
          network_interface: eth0
          region: eu-central
          jurisdiction: CH
        gw-singapore:
          ansible_host: 10.0.4.10
          node_id: gw-singapore-01
          network_interface: eth0
          region: ap-southeast
          jurisdiction: SG

    # Raft 集群 - 三司法管辖区分布
    os_nodes:
      hosts:
        os-iceland:
          ansible_host: 10.0.1.20
          node_id: os-iceland
          raft_node_id: 1
          raft_addr: "10.0.1.20:50848"
          jurisdiction: IS
        os-switzerland:
          ansible_host: 10.0.2.20
          node_id: os-switzerland
          raft_node_id: 2
          raft_addr: "10.0.2.20:50848"
          jurisdiction: CH
        os-singapore:
          ansible_host: 10.0.4.20
          node_id: os-singapore
          raft_node_id: 3
          raft_addr: "10.0.4.20:50848"
          jurisdiction: SG

    # 边缘廉价 VPS 节点（Dogfooding 用）
    edge_nodes:
      hosts:
        edge-vps-01:
          ansible_host: "{{ vault_edge_vps_01_ip }}"
          node_id: edge-vps-01
          network_interface: eth0
          region: us-east
          is_edge: true
        edge-vps-02:
          ansible_host: "{{ vault_edge_vps_02_ip }}"
          node_id: edge-vps-02
          network_interface: eth0
          region: eu-west
          is_edge: true
        edge-vps-03:
          ansible_host: "{{ vault_edge_vps_03_ip }}"
          node_id: edge-vps-03
          network_interface: eth0
          region: ap-east
          is_edge: true
